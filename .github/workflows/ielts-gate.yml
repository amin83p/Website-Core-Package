name: IELTS Gate

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ielts-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ielts-gate:
    name: Freeze + Guard Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run IELTS gate
        env:
          CI: true
        run: npm run test:ielts:gate
